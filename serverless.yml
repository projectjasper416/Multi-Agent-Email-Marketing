# ─────────────────────────────────────────────────────────────────────
# AI Email Marketing Agent — infrastructure as code (TDD §18).
#
# Two Lambdas with a deliberate key split enforced at the infra level:
#   marketingAgentPlan  -> has ANTHROPIC_API_KEY, NOT RESEND_API_KEY
#   marketingAgentSend  -> has RESEND_API_KEY + webhook secret, NOT ANTHROPIC
# A planning-side bug cannot send email; the delivery side cannot call Claude.
# ─────────────────────────────────────────────────────────────────────
service: ai-email-marketing-agent

frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.12
  region: ${env:AWS_REGION, 'us-east-1'}
  memorySize: 256
  # Shared env vars (both functions). Per-function blocks add the split keys.
  environment:
    CUSTOMER_ID: ${env:CUSTOMER_ID}
    SUPABASE_URL: ${env:SUPABASE_URL}
    SUPABASE_SERVICE_ROLE_KEY: ${env:SUPABASE_SERVICE_ROLE_KEY}
    SUPABASE_DB_URL: ${env:SUPABASE_DB_URL}
    LANGSMITH_API_KEY: ${env:LANGSMITH_API_KEY}
    LANGSMITH_TRACING: "true"
    LANGSMITH_PROJECT: ${env:LANGSMITH_PROJECT, 'ai-email-marketing-agent'}
    TELEGRAM_BOT_TOKEN: ${env:TELEGRAM_BOT_TOKEN}
    TELEGRAM_CHAT_ID: ${env:TELEGRAM_CHAT_ID}

functions:
  # ── Planning Lambda ────────────────────────────────────────────────
  marketingAgentPlan:
    handler: handler_plan.handler
    timeout: 300                       # up to 2-4 min for large LLM batches
    environment:
      ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY}   # planning only
    events:
      - schedule:
          rate: cron(0 9 * * ? *)      # 9am UTC daily
          enabled: true                # flip to false until go-live

  # ── Delivery Lambda ────────────────────────────────────────────────
  marketingAgentSend:
    handler: handler_send.handler
    timeout: 60                        # mostly Resend API calls
    environment:
      RESEND_API_KEY: ${env:RESEND_API_KEY}              # delivery only
      TELEGRAM_WEBHOOK_SECRET: ${env:TELEGRAM_WEBHOOK_SECRET}
    events:
      - http:
          path: telegram/callback
          method: post

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true                 # compile native deps for Amazon Linux
    slim: true
